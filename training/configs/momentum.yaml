# LoRA fine-tuning configuration for the Momentum Trader persona
# Section III — The Proposed Framework
#
# Design notes:
#   - r=8 and lora_alpha=16 give a scaling factor of 2, which is a standard default
#     for small adapters. Higher rank would increase capacity but costs more memory.
#   - We target only q_proj and v_proj (not k_proj) following the original LoRA paper,
#     which found attention value/query projections most important for task adaptation.
#   - lr=2e-4 is higher than typical full fine-tuning because LoRA adapters start at zero
#     and need larger steps to converge quickly on small datasets.

# Model
base_model_name_or_path: "Qwen/Qwen2.5-1.5B-Instruct"
persona: "momentum"

# Data
train_data_path: "data/personas/momentum.jsonl"

# LoRA adapter configuration
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules:
  - "q_proj"
  - "v_proj"
bias: "none"
task_type: "CAUSAL_LM"

# Training hyperparameters
num_train_epochs: 3
per_device_train_batch_size: 4
gradient_accumulation_steps: 2
learning_rate: 0.0002
lr_scheduler_type: "cosine"
warmup_ratio: 0.05
weight_decay: 0.01
max_length: 512

# Output
output_dir: "training/adapters/momentum"
logging_steps: 10
save_strategy: "epoch"
fp16: false
bf16: true
